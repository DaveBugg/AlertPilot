# Example: Home Assistant automation to send alerts to AlertPilot
# Add to your automations.yaml

- alias: "AlertPilot: High Temperature Alert"
  trigger:
    - platform: numeric_state
      entity_id: sensor.server_room_temperature
      above: 28
  action:
    - service: rest_command.alertpilot_notify
      data:
        title: "Temperature {{ states('sensor.server_room_temperature') }}°C in server room"
        message: "Server room temperature is above 28°C. Consider turning on AC."
        priority: "4"
        tags: "thermometer,warning"

